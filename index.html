<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>alllign partners - Map</title>
<style>
html, body, #map {
  margin: 0;
  padding: 0;
  height: 100%;
  width: 100%;
  overflow: hidden;
}
</style>
</head>
<body>
<div id="map"></div>
<script>
function initMap() {
  var styles = [
    {featureType:"administrative",elementType:"all",stylers:[{saturation:"-100"}]},
    {featureType:"administrative.province",elementType:"all",stylers:[{visibility:"off"}]},
    {featureType:"landscape",elementType:"all",stylers:[{saturation:"-100"},{lightness:"24"},{visibility:"on"}]},
    {featureType:"landscape.natural",elementType:"geometry",stylers:[{color:"#B5C694"}]},
    {featureType:"poi",elementType:"all",stylers:[{visibility:"simplified"}]},
    {featureType:"poi.park",elementType:"geometry",stylers:[{color:"#B5C694"}]},
    {featureType:"poi.sports_complex",elementType:"geometry",stylers:[{color:"#A8B296"}]},
    {featureType:"poi.attraction",elementType:"geometry",stylers:[{color:"#A8B296"}]},
    {featureType:"road",elementType:"all",stylers:[{saturation:"-100"}]},
    {featureType:"road.highway",elementType:"all",stylers:[{visibility:"simplified"}]},
    {featureType:"road.arterial",elementType:"all",stylers:[{lightness:"30"}]},
    {featureType:"road.local",elementType:"all",stylers:[{lightness:"40"}]},
    {featureType:"transit",elementType:"all",stylers:[{saturation:-100},{visibility:"simplified"}]},
    {featureType:"water",elementType:"geometry",stylers:[{hue:"#ffff00"},{lightness:-25},{saturation:-97}]},
    {featureType:"water",elementType:"labels",stylers:[{lightness:-25},{saturation:-100}]}
  ];

  var map = new google.maps.Map(document.getElementById("map"), {
    center: {lat: 35.65487, lng: 139.74498},
    zoom: 16,
    styles: styles,
    disableDefaultUI: false,
    zoomControl: true,
    mapTypeControl: false,
    streetViewControl: false,
    fullscreenControl: false,
    gestureHandling: "cooperative",
    tilt: 45
  });

  var pinIcon = {
    path: google.maps.SymbolPath.CIRCLE,
    fillColor: "#7BA428",
    fillOpacity: 1,
    strokeColor: "#5a7a1c",
    strokeWeight: 2,
    scale: 10
  };

  var marker = new google.maps.Marker({
    position: {lat: 35.65487, lng: 139.74498},
    map: map,
    icon: pinIcon,
    title: "alllign partners"
  });

  var infoContent = '<div style="font-family:sans-serif;font-size:13px;line-height:1.6;padding:4px 0;">'
    + '<strong style="font-size:14px;">alllign partners</strong><br>'
    + '\u3012105-0014<br>'
    + '\u6771\u4EAC\u90FD\u6E2F\u533A\u829D2-3-31<br>'
    + '\u677E\u6751\u30D3\u30EB 2F'
    + '<\/div>';

  var infoWindow = new google.maps.InfoWindow({content: infoContent});
  infoWindow.open(map, marker);

  marker.addListener("click", function() {
    infoWindow.open(map, marker);
  });
}
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAapkxdk75Z8C47cNn0vuXLlXyZGzoAX0A&callback=initMap&v=weekly"></script>
</body>
</html>
